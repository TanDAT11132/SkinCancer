services:
  - type: web
    name: skincancer-model
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./ModelService/Dockerfile
    dockerContext: ./ModelService
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: DEVICE
        value: cpu
      - key: MODEL_CKPT_PATH
        value: artifacts/best_model.pt
      - key: MODEL_NAME
        value: efficientnet_b3
      - key: IMAGE_SIZE
        value: "300"
      - key: MAX_BATCH_SIZE
        value: "32"
      - key: MIN_SKIN_RATIO
        value: "0.15"

  - type: web
    name: skincancer-backend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "10000"
      - key: SPRING_DATASOURCE_HOST
        fromDatabase:
          name: skincancer-db
          property: host
      - key: SPRING_DATASOURCE_PORT
        fromDatabase:
          name: skincancer-db
          property: port
      - key: SPRING_DATASOURCE_DB
        fromDatabase:
          name: skincancer-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: skincancer-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: skincancer-db
          property: password
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: APP_FASTAPI_BASE_URL
        fromService:
          type: web
          name: skincancer-model
          property: hostport
      - key: APP_FASTAPI_DEFAULT_TOP_K
        value: "3"
      - key: APP_UPLOAD_ROOT_DIR
        value: /tmp/uploads
      - key: APP_FRONTEND_API_BASE_URL
        value: ""
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://skincancer-backend.onrender.com
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_ADMIN_EMAIL
        sync: false
      - key: APP_GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: skincancer-db
    plan: free
    region: singapore
    databaseName: skincancer
    user: skincancer
