spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DB:skincancer}}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

server:
  port: ${PORT:8001}

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-min-32-chars-please-change}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:10080}
  fastapi:
    base-url: ${APP_FASTAPI_BASE_URL:http://localhost:8002}
    default-top-k: ${APP_FASTAPI_DEFAULT_TOP_K:3}
  admin:
    emails:
      - ${APP_ADMIN_EMAIL:admin@example.com}
  upload:
    root-dir: ${APP_UPLOAD_ROOT_DIR:D:/SkinCancer/uploads}
  frontend:
    api-base-url: ${APP_FRONTEND_API_BASE_URL:}
    google-client-id: ${APP_GOOGLE_CLIENT_ID:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5000}
